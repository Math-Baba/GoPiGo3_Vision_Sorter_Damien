<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Controller</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <h1>Robot Controller</h1>

  <section class="card">
    <h2>Couleur cible</h2>
    <div class="colors">
      <label class="color-btn green">
        <input type="radio" name="color" value="green"> Vert
      </label>
      <label class="color-btn yellow">
        <input type="radio" name="color" value="yellow"> Jaune
      </label>
      <label class="color-btn blue">
        <input type="radio" name="color" value="blue"> Bleu
      </label>
      <label class="color-btn red">
        <input type="radio" name="color" value="red"> Rouge
      </label>
    </div>
  </section>

  <section class="card">
    <h2>Flux caméra</h2>
    <div id="feed-container">
      <img id="feed" alt="Flux caméra">
    </div>
    <div id="status">En attente...</div>
  </section>

  <section class="card">
    <h2>Détection</h2>
    <div id="detection">Aucun cube détecté</div>
  </section>

  <script src="/app.js"></script>
</body>
</html>
